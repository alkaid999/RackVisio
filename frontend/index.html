<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDC 机房管理平台</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230f172a'/%3E%3Crect x='8' y='6' width='16' height='20' rx='2' fill='%2314b8a6'/%3E%3Crect x='11' y='9' width='10' height='2.4' rx='1' fill='%230f172a'/%3E%3Crect x='11' y='14' width='10' height='2.4' rx='1' fill='%230f172a'/%3E%3Crect x='11' y='19' width='10' height='2.4' rx='1' fill='%230f172a'/%3E%3C/svg%3E"
    />
    <!-- 主题防闪烁：首屏渲染前根据 localStorage / 系统偏好确定明暗，避免白屏闪烁 -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'system';
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
